<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DUCKTIERS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --bg2:#161b22;
  --bg3:#1c2333;
  --bg4:#21262d;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --accent:#f0a500;
  --accent2:#e05c00;
  --green:#238636;
  --red:#da3633;
  --blue:#1f6feb;
  --t1:#c9a227;
  --t2:#9e9e9e;
  --t3:#cd7f32;
  --eu:#3b5fc0;
  --na:#c0392b;
  --aus:#27ae60;
}
html{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;padding:0 24px;height:56px;
}
.nav-logo{
  font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:2px;margin-right:32px;
  background:linear-gradient(90deg,#f0a500,#e05c00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-links{display:flex;gap:4px;align-items:center;flex:1}
.nav-links a{
  display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;
  font-size:14px;color:var(--muted);transition:all .15s;
}
.nav-links a:hover{background:var(--bg3);color:var(--text)}
.nav-links a.active{color:var(--text)}
.nav-links a svg{width:16px;height:16px;opacity:.7}
.search-wrap{position:relative;margin-left:auto}
.search-wrap input{
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:6px 12px 6px 36px;font-size:14px;width:220px;
  outline:none;transition:border .15s;
}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;width:16px;height:16px}
.search-results{
  position:absolute;top:calc(100% + 4px);right:0;width:280px;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;display:none;z-index:200;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.search-results.open{display:block}
.search-result-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  cursor:pointer;transition:background .1s;font-size:14px;
}
.search-result-item:hover{background:var(--bg4)}
.search-result-item img{width:32px;height:32px;border-radius:3px}
.search-result-meta{font-size:12px;color:var(--muted)}

/* GAMEMODE TABS */
.tabs-wrap{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 24px;overflow-x:auto;scrollbar-width:none;
}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:0;min-width:max-content}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:14px 20px;cursor:pointer;border-bottom:2px solid transparent;
  color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;
  min-width:80px;
}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-icon{font-size:22px;line-height:1}

/* MAIN LAYOUT */
.page{max-width:1340px;margin:0 auto;padding:24px 24px 60px}

/* INFO BAR */
.info-bar{
  display:flex;justify-content:flex-end;align-items:center;gap:10px;
  margin-bottom:16px;position:relative;
}
.info-btn{
  display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  font-size:13px;cursor:pointer;color:var(--text);transition:background .15s;
}
.info-btn:hover{background:var(--bg4)}
.info-panel{
  position:absolute;top:calc(100% + 6px);right:0;width:340px;
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:0;overflow:hidden;z-index:50;
  box-shadow:0 12px 32px rgba(0,0,0,.5);
  display:none;
}
.info-panel.open{display:block}
.info-tabs{display:flex;border-bottom:1px solid var(--border)}
.info-tab{
  flex:1;padding:10px 6px;text-align:center;font-size:13px;
  cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all .15s;
}
.info-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.info-body{padding:16px;font-size:13px}
.info-body h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--muted)}
.title-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.title-row .badge{font-size:16px}
.title-name{font-weight:600}
.title-pts{font-size:12px;color:var(--muted)}
.pts-tier{margin-bottom:10px}
.pts-tier-head{display:flex;align-items:center;gap:6px;font-weight:600;margin-bottom:4px}
.pts-pills{display:flex;gap:6px;flex-wrap:wrap}
.pts-pill{
  display:flex;align-items:center;gap:4px;padding:3px 8px;
  background:var(--bg4);border-radius:20px;font-size:12px;
}
.pts-pill svg{width:10px;height:10px;color:var(--accent)}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:6px;margin-bottom:16px}
.vbtn{
  padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;
  background:var(--bg3);border:1px solid var(--border);color:var(--muted);
  transition:all .15s;
}
.vbtn.active{background:var(--bg4);border-color:var(--accent);color:var(--text)}

/* LEADERBOARD VIEW */
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{
  text-align:left;padding:8px 12px;font-size:11px;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid var(--border);
}
.lb-table th:last-child{text-align:right}
.lb-row{
  border-bottom:1px solid rgba(48,54,61,.5);cursor:pointer;
  transition:background .1s;
}
.lb-row:hover{background:rgba(255,255,255,.03)}
.lb-row td{padding:10px 12px;vertical-align:middle}
.rank-cell{font-size:14px;font-weight:700;color:var(--muted);width:50px}
.rank-1{color:var(--t1)}
.rank-2{color:var(--t2)}
.rank-3{color:var(--t3)}
.player-cell{display:flex;align-items:center;gap:10px}
.player-cell img{width:36px;height:36px;border-radius:3px;image-rendering:pixelated}
.player-name{font-weight:600;font-size:15px}
.player-title{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-top:2px}
.region-badge{
  display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;
  font-size:12px;font-weight:600;
}
.region-EU{background:rgba(59,95,192,.25);color:#7ca3f5}
.region-NA{background:rgba(192,57,43,.25);color:#f57c7c}
.region-AUAS{background:rgba(39,174,96,.25);color:#7cf5a3}
.tiers-cell{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.tier-badge{
  display:flex;flex-direction:column;align-items:center;
  width:40px;
}
.tier-badge-icon{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;border:2px solid;
}
.tier-badge-label{font-size:9px;color:var(--muted);margin-top:2px}
.pts-cell{text-align:right;font-weight:700;font-size:15px;color:var(--accent)}

/* TIER COLUMN VIEW */
.cols-view{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:900px){.cols-view{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.cols-view{grid-template-columns:repeat(2,1fr)}}
.tier-col{}
.tier-col-head{
  padding:12px 14px;border-radius:8px 8px 0 0;font-weight:700;
  display:flex;align-items:center;gap:8px;font-size:15px;
  border-bottom:2px solid var(--border);
}
.tier-col-head.t1{background:rgba(201,162,39,.15);border-color:var(--t1);color:var(--t1)}
.tier-col-head.t2{background:rgba(158,158,158,.1);border-color:var(--t2);color:var(--t2)}
.tier-col-head.t3{background:rgba(205,127,50,.12);border-color:var(--t3);color:var(--t3)}
.tier-col-head.t4{background:rgba(255,255,255,.05);border-color:var(--border);color:var(--muted)}
.tier-col-head.t5{background:rgba(255,255,255,.03);border-color:var(--border);color:var(--muted)}
.tier-col-body{
  background:var(--bg2);border:1px solid var(--border);border-top:none;
  border-radius:0 0 8px 8px;min-height:80px;
}
.tier-player-row{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-bottom:1px solid rgba(48,54,61,.4);cursor:pointer;
  transition:background .1s;font-size:13px;
}
.tier-player-row:last-child{border-bottom:none}
.tier-player-row:hover{background:rgba(255,255,255,.04)}
.tier-player-row img{width:26px;height:26px;border-radius:2px;image-rendering:pixelated}
.tier-ht-tag{
  margin-left:auto;font-size:10px;font-weight:700;padding:1px 5px;
  border-radius:3px;
}
.ht-tag{background:rgba(240,165,0,.2);color:var(--accent)}
.lt-tag{background:rgba(139,148,158,.1);color:var(--muted)}
.tier-up-icon{margin-left:auto;color:var(--muted);font-size:11px}

/* PLAYER MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  width:600px;max-width:95vw;max-height:85vh;overflow-y:auto;
  transform:translateY(20px);transition:transform .2s;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-head{
  display:flex;align-items:center;gap:16px;padding:20px 24px;
  border-bottom:1px solid var(--border);
}
.modal-head img{width:72px;height:72px;border-radius:6px;image-rendering:pixelated}
.modal-head-info h2{font-size:22px;font-weight:700;margin-bottom:4px}
.modal-head-info .sub{font-size:13px;color:var(--muted);display:flex;gap:8px;align-items:center}
.modal-close{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:4px 8px;border-radius:4px;transition:background .1s}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-body{padding:20px 24px}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.modal-tiers-grid{display:flex;flex-wrap:wrap;gap:8px}
.modal-tier-item{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  font-size:13px;min-width:140px;
}
.modal-tier-item .gm-icon{font-size:18px}
.modal-tier-item .gm-name{font-weight:600}
.modal-tier-item .gm-tier{font-size:12px;color:var(--muted)}
.modal-pts{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;margin-bottom:10px;
}
.modal-pts-num{font-size:24px;font-weight:700;color:var(--accent)}

/* TIER COLORS */
.c-ht1{border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,.12)}
.c-lt1{border-color:#daa520;color:#daa520;background:rgba(218,165,32,.1)}
.c-ht2{border-color:#c0c0c0;color:#c0c0c0;background:rgba(192,192,192,.1)}
.c-lt2{border-color:#a0a0a0;color:#a0a0a0;background:rgba(160,160,160,.08)}
.c-ht3{border-color:#cd7f32;color:#cd7f32;background:rgba(205,127,50,.1)}
.c-lt3{border-color:#a0522d;color:#a0522d;background:rgba(160,82,45,.08)}
.c-ht4{border-color:#4a9fd4;color:#4a9fd4;background:rgba(74,159,212,.08)}
.c-lt4{border-color:#3a7fa0;color:#3a7fa0;background:rgba(58,127,160,.06)}
.c-ht5{border-color:#6e6e6e;color:#6e6e6e;background:rgba(110,110,110,.08)}
.c-lt5{border-color:#555;color:#777;background:rgba(85,85,85,.06)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

/* FOOTER */
footer{text-align:center;padding:24px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:40px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">DUCKTIERS</div>
  <div class="nav-links">
    <a href="#" class="active">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>

  <div class="search-wrap">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 10-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 001.415-1.414l-3.85-3.85a1.007 1.007 0 00-.115-.1zM12 6.5a5.5 5.5 0 11-11 0 5.5 5.5 0 0111 0z"/></svg>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const TIERS_URL = "https://raw.githubusercontent.com/mybot-drair/tiers/main/tiers.json";

const GAMEMODES = {
  all:     {name:"All",     emoji:"🏆"},
  crystal: {name:"Crystal", emoji:"🔷"},
  sword:   {name:"Sword",   emoji:"⚔️"},
  diapot:  {name:"Diapot",  emoji:"🧪"},
  nethpot: {name:"Nethpot", emoji:"🍵"},
  smp:     {name:"SMP",     emoji:"🌍"},
  mace:    {name:"Mace",    emoji:"🔨"},
  axe:     {name:"Axe",     emoji:"🪓"},
  uhc:     {name:"UHC",     emoji:"💀"},
};

const TIER_LEVELS = ["ht1","lt1","ht2","lt2","ht3","lt3","ht4","lt4","ht5","lt5"];

const TIER_DISPLAY = {
  ht1:"High T1",lt1:"Low T1",
  ht2:"High T2",lt2:"Low T2",
  ht3:"High T3",lt3:"Low T3",
  ht4:"High T4",lt4:"Low T4",
  ht5:"High T5",lt5:"Low T5",
};

const TIER_POINTS = {
  ht1:60,lt1:45,ht2:30,lt2:20,ht3:10,lt3:6,ht4:4,lt4:3,ht5:2,lt5:1
};

const TIER_NUM = {ht1:1,lt1:1,ht2:2,lt2:2,ht3:3,lt3:3,ht4:4,lt4:4,ht5:5,lt5:5};

const TITLES = [
  {name:"Combat Grandmaster",emoji:"🥇",color:"#c9a227",min:400},
  {name:"Combat Master",     emoji:"🥈",color:"#e8a020",min:250},
  {name:"Combat Ace",        emoji:"💎",color:"#a855f7",min:100},
  {name:"Combat Specialist", emoji:"🔮",color:"#818cf8",min:50},
  {name:"Combat Cadet",      emoji:"🛡️",color:"#6b7280",min:20},
  {name:"Combat Novice",     emoji:"⚙️",color:"#4b5563",min:10},
  {name:"Rookie",            emoji:"🔰",color:"#374151",min:0},
];

function getTitle(pts){
  for(const t of TITLES) if(pts>=t.min) return t;
  return TITLES[TITLES.length-1];
}

// ─── State ───────────────────────────────────────────────────────────────────
let allPlayers = [];
let activeGM   = "all";
let activeView = "lb";
let infoActiveTab = "titles";

// ─── Load Data ───────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const r = await fetch(TIERS_URL+"?t="+Date.now());
    const d = await r.json();
    allPlayers = d.players || [];
  }catch(e){
    allPlayers = [];
  }
  render();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function skinUrl(u){return `https://minotar.net/avatar/${u}/36`}
function skinUrlBig(u){return `https://render.crafty.gg/3d/bust/${u}`}

function computePoints(p){
  if(p.total_points!=null) return p.total_points;
  let s=0;
  for(const gm of Object.keys(p.tiers||{})){
    const lvl=(p.tiers[gm].level||p.tiers[gm].tier_key?.split("_")[0]);
    if(lvl) s+=TIER_POINTS[lvl]||0;
  }
  return s;
}

function getTierLevel(p,gm){
  const t=p.tiers?.[gm];
  if(!t) return null;
  return t.level || t.tier_key?.split("_")[0];
}

function filteredPlayers(){
  if(activeGM==="all") return [...allPlayers].sort((a,b)=>computePoints(b)-computePoints(a));
  return allPlayers
    .filter(p=>p.tiers&&p.tiers[activeGM])
    .sort((a,b)=>{
      const la=getTierLevel(a,activeGM)||"lt5";
      const lb=getTierLevel(b,activeGM)||"lt5";
      const ia=TIER_LEVELS.indexOf(la), ib=TIER_LEVELS.indexOf(lb);
      return ia-ib;
    });
}

function regionClass(r){
  if(!r) return "";
  if(r==="EU") return "region-EU";
  if(r==="NA") return "region-NA";
  return "region-AUAS";
}

function tierColorClass(lvl){
  if(!lvl) return "";
  return `c-${lvl}`;
}

// ─── Render Tabs ─────────────────────────────────────────────────────────────
function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=Object.entries(GAMEMODES).map(([k,v])=>`
    <div class="tab${k===activeGM?" active":""}" onclick="setGM('${k}')">
      <span class="tab-icon">${v.emoji}</span>
      <span>${v.name}</span>
    </div>
  `).join("");
}

// ─── Render Main ─────────────────────────────────────────────────────────────
function render(){
  renderTabs();
  if(activeView==="lb") renderLb();
  else renderCols();
}

// ─── Leaderboard ─────────────────────────────────────────────────────────────
function renderLb(){
  const players=filteredPlayers();
  const el=document.getElementById("mainContent");
  if(!players.length){
    el.innerHTML=`<div class="empty">No players found for this gamemode.</div>`;
    return;
  }

  const showTiers=activeGM==="all";

  let html=`<table class="lb-table">
    <thead><tr>
      <th>#</th>
      <th>Player</th>
      <th>Region</th>
      ${showTiers?`<th style="text-align:right">Tiers</th>`:`<th style="text-align:right">Tier</th>`}
      <th>Points</th>
    </tr></thead><tbody>`;

  players.forEach((p,i)=>{
    const rank=i+1;
    const rankCls=rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"";
    const pts=computePoints(p);
    const title=getTitle(pts);
    const reg=p.region||"";

    let tiersHtml="";
    if(showTiers){
      const gmList=Object.keys(p.tiers||{}).slice(0,8);
      tiersHtml=`<div class="tiers-cell">`;
      for(const gm of gmList){
        const lvl=getTierLevel(p,gm);
        if(!lvl) continue;
        const gmi=GAMEMODES[gm]||{emoji:"?"};
        tiersHtml+=`
          <div class="tier-badge">
            <div class="tier-badge-icon ${tierColorClass(lvl)}" title="${gmi.name}: ${TIER_DISPLAY[lvl]}">
              ${lvl.toUpperCase()}
            </div>
            <div class="tier-badge-label">${gmi.emoji}</div>
          </div>`;
      }
      tiersHtml+=`</div>`;
    } else {
      const lvl=getTierLevel(p,activeGM);
      tiersHtml=`<div class="tiers-cell"><div class="tier-badge">
        <div class="tier-badge-icon ${tierColorClass(lvl)}">${lvl?.toUpperCase()||"?"}</div>
      </div></div>`;
    }

    html+=`<tr class="lb-row" onclick="openPlayer('${p.username}')">
      <td class="rank-cell ${rankCls}">${rank}.</td>
      <td><div class="player-cell">
        <img src="${skinUrl(p.username)}" alt="" loading="lazy"/>
        <div>
          <div class="player-name">${p.username}</div>
          <div class="player-title"><span>${title.emoji}</span><span style="color:${title.color}">${title.name}</span><span>(${pts} points)</span></div>
        </div>
      </div></td>
      <td><span class="region-badge ${regionClass(reg)}">${reg||"—"}</span></td>
      <td>${tiersHtml}</td>
      <td class="pts-cell">${pts}</td>
    </tr>`;
  });

  html+=`</tbody></table>`;
  el.innerHTML=html;
}

// ─── Tier Columns ─────────────────────────────────────────────────────────────
function renderCols(){
  const el=document.getElementById("mainContent");
  const gm=activeGM==="all"?"crystal":activeGM; // default to crystal for "all"

  // Group players by tier number
  const byTier={1:[],2:[],3:[],4:[],5:[]};
  const players=activeGM==="all"
    ?allPlayers.filter(p=>p.tiers&&p.tiers[gm])
    :filteredPlayers();

  for(const p of players){
    const lvl=getTierLevel(p,gm);
    if(!lvl) continue;
    const num=TIER_NUM[lvl];
    if(byTier[num]) byTier[num].push({p,lvl});
  }

  const headClass=["","t1","t2","t3","t4","t5"];
  const headIcon=["","🏆","🏅","🏅","",""];

  let html=`<div class="cols-view">`;
  for(let t=1;t<=5;t++){
    const cls=headClass[t];
    const icon=headIcon[t]||"";
    html+=`<div class="tier-col">
      <div class="tier-col-head ${cls}">${icon} Tier ${t}</div>
      <div class="tier-col-body">`;
    if(!byTier[t].length){
      html+=`<div style="padding:16px 12px;color:var(--muted);font-size:13px">—</div>`;
    } else {
      // Sort HT before LT within the tier
      byTier[t].sort((a,b)=>(a.lvl.startsWith("ht")?0:1)-(b.lvl.startsWith("ht")?0:1));
      for(const {p,lvl} of byTier[t]){
        const isHT=lvl.startsWith("ht");
        html+=`<div class="tier-player-row" onclick="openPlayer('${p.username}')">
          <img src="${skinUrl(p.username)}" alt="" loading="lazy"/>
          <span>${p.username}</span>
          <span class="tier-ht-tag ${isHT?"ht-tag":"lt-tag"}">${lvl.toUpperCase()}</span>
          <span class="tier-up-icon">⌃</span>
        </div>`;
      }
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

// ─── Player Modal ─────────────────────────────────────────────────────────────
function openPlayer(username){
  const p=allPlayers.find(x=>x.username===username);
  if(!p) return;

  const pts=computePoints(p);
  const title=getTitle(pts);
  const el=document.getElementById("playerModal");

  let tiersHtml="";
  for(const [gm,tierData] of Object.entries(p.tiers||{})){
    const gmi=GAMEMODES[gm]||{name:gm,emoji:"?"};
    const lvl=tierData.level||tierData.tier_key?.split("_")[0];
    if(!lvl) continue;
    tiersHtml+=`<div class="modal-tier-item">
      <span class="gm-icon">${gmi.emoji}</span>
      <div>
        <div class="gm-name">${gmi.name}</div>
        <div class="gm-tier ${tierColorClass(lvl)}" style="border:none;background:none;padding:0">${TIER_DISPLAY[lvl]}</div>
      </div>
      <span class="tier-badge-icon ${tierColorClass(lvl)}" style="margin-left:auto;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid;flex-shrink:0">${lvl.toUpperCase()}</span>
    </div>`;
  }

  el.innerHTML=`
    <div class="modal-head">
      <img src="${skinUrlBig(p.username)}" alt="" style="width:72px;height:auto;max-height:100px"/>
      <div class="modal-head-info">
        <h2>${p.username}</h2>
        <div class="sub">
          <span>${title.emoji}</span>
          <span style="color:${title.color};font-weight:600">${title.name}</span>
          <span class="region-badge ${regionClass(p.region||"")}">${p.region||"—"}</span>
        </div>
      </div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-pts">
          <div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:2px">TOTAL POINTS</div>
            <div class="modal-pts-num">${pts}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:12px;color:var(--muted);margin-bottom:2px">RANK</div>
            <div style="font-size:20px;font-weight:700">#${allPlayers.sort((a,b)=>computePoints(b)-computePoints(a)).findIndex(x=>x.username===username)+1}</div>
          </div>
        </div>
      </div>
      <div class="modal-section">
        <h3>Tiers</h3>
        <div class="modal-tiers-grid">${tiersHtml||"<span style='color:var(--muted);font-size:13px'>No tiers yet</span>"}</div>
      </div>
    </div>
  `;

  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal(e){
  if(e&&e.target!==document.getElementById("modalOverlay")) return;
  document.getElementById("modalOverlay").classList.remove("open");
}

// ─── Info Panel ──────────────────────────────────────────────────────────────
function renderInfoPanel(){
  const el=document.getElementById("infoPanelBody");
  if(infoActiveTab==="titles"){
    el.innerHTML=`<h3>How to obtain Achievement Titles</h3>`+
    TITLES.map(t=>`
      <div class="title-row">
        <span class="badge">${t.emoji}</span>
        <div>
          <div class="title-name" style="color:${t.color}">${t.name}</div>
          <div class="title-pts">Obtained ${t.min}+ total points.</div>
        </div>
      </div>
    `).join("");
  } else {
    const tiers=[
      {num:1,pts:[60,45],cls:"t1",icon:"🏆"},
      {num:2,pts:[30,20],cls:"t2",icon:"🥈"},
      {num:3,pts:[10,6], cls:"t3",icon:"🥉"},
      {num:4,pts:[4,3],  cls:"t4"},
      {num:5,pts:[2,1],  cls:"t5"},
    ];
    el.innerHTML=`<h3>How ranking points are calculated</h3>`+
    tiers.map(t=>`
      <div class="pts-tier">
        <div class="pts-tier-head ${t.cls}" style="color:var(--${t.cls==='t1'?'t1':t.cls==='t2'?'t2':t.cls==='t3'?'t3':'muted'})">${t.icon||""} Tier ${t.num}</div>
        <div class="pts-pills" style="margin-top:6px">
          <div class="pts-pill"><span style="color:var(--accent)">⌃</span> ${t.pts[0]} Points (HT)</div>
          <div class="pts-pill"><span style="color:var(--muted)">⌃</span> ${t.pts[1]} Point${t.pts[1]===1?"":"s"} (LT)</div>
        </div>
      </div>
    `).join("");
  }
}

document.getElementById("infoBtn").addEventListener("click",()=>{
  const p=document.getElementById("infoPanel");
  p.classList.toggle("open");
  if(p.classList.contains("open")) renderInfoPanel();
});

document.querySelectorAll(".info-tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".info-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    infoActiveTab=tab.dataset.tab;
    renderInfoPanel();
  });
});

document.addEventListener("click",e=>{
  const panel=document.getElementById("infoPanel");
  const btn=document.getElementById("infoBtn");
  if(!panel.contains(e.target)&&!btn.contains(e.target)){
    panel.classList.remove("open");
  }
});

// ─── Search ──────────────────────────────────────────────────────────────────
const searchInput=document.getElementById("searchInput");
const searchResults=document.getElementById("searchResults");

searchInput.addEventListener("input",()=>{
  const q=searchInput.value.trim().toLowerCase();
  if(!q){searchResults.classList.remove("open");return;}
  const matches=allPlayers.filter(p=>p.username.toLowerCase().includes(q)).slice(0,6);
  if(!matches.length){searchResults.classList.remove("open");return;}
  searchResults.innerHTML=matches.map(p=>{
    const pts=computePoints(p);
    const t=getTitle(pts);
    return `<div class="search-result-item" onclick="openPlayer('${p.username}');searchResults.classList.remove('open');searchInput.value=''">
      <img src="${skinUrl(p.username)}" alt=""/>
      <div>
        <div style="font-weight:600">${p.username}</div>
        <div class="search-result-meta">${t.emoji} ${t.name} · ${pts} pts</div>
      </div>
      <span class="region-badge ${regionClass(p.region||"")}" style="margin-left:auto">${p.region||"—"}</span>
    </div>`;
  }).join("");
  searchResults.classList.add("open");
});

document.addEventListener("click",e=>{
  if(!searchInput.contains(e.target)&&!searchResults.contains(e.target)){
    searchResults.classList.remove("open");
  }
});

searchInput.addEventListener("keydown",e=>{
  if(e.key==="/"&&e.target!==searchInput) searchInput.focus();
});

// ─── Controls ────────────────────────────────────────────────────────────────
function setGM(gm){
  activeGM=gm;render();
}
function setView(v){
  activeView=v;
  document.getElementById("btnLb").classList.toggle("active",v==="lb");
  document.getElementById("btnCols").classList.toggle("active",v==="cols");
  render();
}

// ─── Init ────────────────────────────────────────────────────────────────────
loadData();
setInterval(loadData,60000); // refresh every minute
</script>
</body>
</html>
